name: MinNote
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
targets:
  MinNote:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MinNote
        excludes:
          - Resources
      - path: MinNote/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: MinNote
        PRODUCT_BUNDLE_IDENTIFIER: com.saic.MinNote
        INFOPLIST_FILE: Config/Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/MinNote.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets: []
